<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mr. Sam's To-Do App</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- TITLE -->
    <h1>Mr. Sam's To-Do List</h1>

    <!-- HEADER -->
    <div class="header">
        <h2 id="taskCount">You Have 0 Tasks To Do</h2>
        <p id="date"></p>
    </div>

    <!-- INPUT -->
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Add your task">

        <select id="categorySelect">
            <option value="General">General</option>
            <option value="Design">Design</option>
            <option value="Coding">Coding</option>
            <option value="Meeting">Meeting</option>
        </select>

        <button onclick="addTodo()">+</button>
    </div>

    <!-- STATUS CARDS -->
    <div class="stats">
        <div class="card blue">Pending<br><span id="ongoingCount">0</span></div>
        <div class="card yellow">In Process<br><span id="processCount">0</span></div>
        <div class="card green">Completed<br><span id="completedCount">0</span></div>
        <div class="card red">Cancelled<br><span id="cancelledCount">0</span></div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
        <button onclick="setFilter('all', this)">All</button>
        <button onclick="setFilter('pending', this)">Pending</button>
        <button onclick="setFilter('completed', this)">Completed</button>
        <button onclick="setFilter('cancelled', this)">Cancelled</button>
    </div>

    <!-- TASK HEADER -->
    <div class="tasks-header">
        <h2>Your Tasks</h2>
        <button onclick="toggleHistory()" class="history-btn">Task History</button>
    </div>

    <!-- TASK LIST -->
    <ul id="todoList"></ul>

</div>

<!-- ================= HISTORY POPUP ================= -->
<div id="historyPopup" class="history-popup hidden">
    <div class="history-content">

        <div class="history-header">
            <h3>Task History</h3>
            <button onclick="toggleHistory()">✕</button>
        </div>

        <div class="history-filters">
            <button onclick="setHistoryFilter('all', this)">All</button>
            <button onclick="setHistoryFilter('completed', this)">Completed</button>
            <button onclick="setHistoryFilter('cancelled', this)">Cancelled</button>
        </div>

        <!-- SCROLLABLE -->
        <div class="history-body">
            <ul id="historyList"></ul>
        </div>

        <!-- FIXED FOOTER -->
        <div class="history-footer">
            <button onclick="clearHistory()" class="clear-history-btn">
                Clear History
            </button>
        </div>

    </div>
</div>

<!-- CLEAR ALL -->
<button onclick="clearAllTasks()" class="clear-all-btn">
    🗑 Clear All Tasks
</button>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
